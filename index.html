<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      window.addEventListener('error', function(e) {
        if (e.message === 'Script error.' || !e.filename) {
          console.warn('Suppressed benign sandbox/iframe cross-origin script event:', e);
          e.preventDefault();
          e.stopPropagation();
          return true;
        }
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        console.warn('Suppressed unhandled promise rejection state:', e.reason);
        e.preventDefault();
        e.stopPropagation();
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

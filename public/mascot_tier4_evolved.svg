<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Glowing shadow -->
  <ellipse cx="64" cy="114" rx="46" ry="11" fill="#fde047" opacity="0.3" filter="blur(2px)"/>
  <ellipse cx="64" cy="112" rx="42" ry="9" fill="#cbd5e1" opacity="0.8"/>
  
  <defs>
    <!-- Celestial grand gradient -->
    <linearGradient id="bodyGradEvolved" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Radiant tiny gold aura rays background -->
  <g stroke="#fef08a" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <line x1="64" y1="12" x2="64" y2="2" />
    <line x1="24" y1="24" x2="16" y2="16" />
    <line x1="104" y1="24" x2="112" y2="16" />
    <line x1="16" y1="64" x2="6" y2="64" />
    <line x1="112" y1="64" x2="122" y2="64" />
  </g>

  <!-- Tiny angel wings fluffing out -->
  <path d="M22,70 C10,65 5,45 18,48 C24,49 26,55 24,66 Z" fill="#f3e8ff" stroke="#111c2d" stroke-width="3.5" />
  <path d="M106,70 C118,65 123,45 110,48 C104,49 102,55 104,66 Z" fill="#f3e8ff" stroke="#111c2d" stroke-width="3.5" />

  <!-- Feet with matching cosmic style -->
  <ellipse cx="44" cy="108" rx="14" ry="9" fill="#a855f7" stroke="#111c2d" stroke-width="4"/>
  <ellipse cx="84" cy="108" rx="14" ry="9" fill="#a855f7" stroke="#111c2d" stroke-width="4"/>

  <!-- Floating golden halo above head -->
  <ellipse cx="64" cy="16" rx="22" ry="6" fill="none" stroke="#eab308" stroke-width="5" filter="url(#glow)"/>
  <ellipse cx="64" cy="16" rx="22" ry="6" fill="none" stroke="#111c2d" stroke-width="2"/>

  <!-- Round fluffy body -->
  <circle cx="64" cy="68" r="45" fill="url(#bodyGradEvolved)" stroke="#111c2d" stroke-width="4" />

  <!-- Gorgeous cute fluffy ears -->
  <path d="M22,44 C8,38 8,64 20,60 Z" fill="#a855f7" stroke="#111c2d" stroke-width="4" />
  <path d="M106,44 C120,38 120,64 108,60 Z" fill="#ec4899" stroke="#111c2d" stroke-width="4" />

  <!-- Sparkly joyful closed happy eyes -->
  <path d="M44,62 Q48,56 52,62" stroke="#111c2d" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M76,62 Q80,56 84,62" stroke="#111c2d" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Happy broad blush smile -->
  <path d="M54,74 Q64,86 74,74" stroke="#111c2d" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Glowing rosy blush with stars -->
  <circle cx="38" cy="72" r="8" fill="#f43f5e" opacity="0.6"/>
  <circle cx="90" cy="72" r="8" fill="#f43f5e" opacity="0.6"/>

  <!-- Golden crown on forehead -->
  <path d="M58,46 L60,40 L64,44 L68,40 L70,46 Z" fill="#fbbf24" stroke="#111c2d" stroke-width="2"/>

  <!-- Holding a magical, glowing golden pink heart -->
  <g transform="translate(52, 75)">
    <path d="M12,5 C12,1.5 8,0 6,2.5 C4,0 0,1.5 0,5 C0,9.5 6,14 6,14 C6,14 12,9.5 12,5 Z" fill="#fb7185" stroke="#111c2d" stroke-width="2.5" transform="scale(1.2)" />
  </g>
</svg>
